<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="1024" viewBox="0 0 2048 1024">
  <!-- Fondo oscuro -->
  <rect width="2048" height="1024" fill="#1a1a2e" />
  
  <!-- Cuadrícula para percibir el 3D -->
  <defs>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="none" stroke="#2a2a4e" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="2048" height="1024" fill="url(#grid)" />
  
  <!-- Línea del horizonte -->
  <line x1="0" y1="512" x2="2048" y2="512" stroke="#4a4a8e" stroke-width="4"/>
  
  <!-- Texto central -->
  <text x="1024" y="512" font-family="sans-serif" font-size="64" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">
    ESPACIO DE PRUEBA 360
  </text>
  <text x="1024" y="580" font-family="sans-serif" font-size="32" fill="#aaaaaa" text-anchor="middle">
    Reemplaza esto con tus renders de D5
  </text>
</svg>
